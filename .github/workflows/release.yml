name: Release

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Determine next version and create Release PR ──
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases: ${{ steps.release-plz.outputs.releases }}
      prs: ${{ steps.release-plz.outputs.prs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run release-plz
        id: release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Build and publish when release-plz creates a release ──
  build-and-publish:
    name: Build & Publish
    if: ${{ fromJSON(needs.release-plz.outputs.releases)[0] != '' }}
    needs: [release-plz]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: dbeaver-proxy-x86_64-linux
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: dbeaver-proxy-x86_64-windows.exe
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact_raw: dbeaver-proxy-x86_64-macos
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact_raw: dbeaver-proxy-aarch64-macos

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}-${{ matrix.target }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          binary="target/${{ matrix.target }}/release/dbeaver-proxy"
          if [ "${{ matrix.runner }}" = "windows-latest" ]; then
            binary="${binary}.exe"
          fi

          if [ "${{ matrix.artifact_raw }}" != "" ]; then
            artifact_name="${{ matrix.artifact_raw }}"
          else
            artifact_name="${{ matrix.artifact }}"
          fi
          cp "$binary" "$artifact_name"

          # Generate SHA256 checksum
          if command -v sha256sum &> /dev/null; then
            sha256sum "$artifact_name" > "${artifact_name}.sha256"
          elif command -v shasum &> /dev/null; then
            shasum -a 256 "$artifact_name" > "${artifact_name}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}${{ matrix.artifact_raw }}
          path: |
            ${{ matrix.artifact }}${{ matrix.artifact_raw }}
            ${{ matrix.artifact }}${{ matrix.artifact_raw }}.sha256

  # ── Create macOS Universal Binary ──
  universal-macos:
    name: Universal Binary (macOS)
    if: ${{ fromJSON(needs.release-plz.outputs.releases)[0] != '' }}
    needs: [release-plz, build-and-publish]
    runs-on: macos-latest
    steps:
      - name: Download x86_64 macOS binary
        uses: actions/download-artifact@v4
        with:
          name: dbeaver-proxy-x86_64-macos

      - name: Download aarch64 macOS binary
        uses: actions/download-artifact@v4
        with:
          name: dbeaver-proxy-aarch64-macos

      - name: Create universal binary
        run: |
          chmod +x dbeaver-proxy-x86_64-macos dbeaver-proxy-aarch64-macos
          lipo -create -output dbeaver-proxy-macos \
            dbeaver-proxy-x86_64-macos \
            dbeaver-proxy-aarch64-macos
          codesign --force --deep -s - dbeaver-proxy-macos
          sha256sum dbeaver-proxy-macos > dbeaver-proxy-macos.sha256
          file dbeaver-proxy-macos

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: dbeaver-proxy-macos
          path: |
            dbeaver-proxy-macos
            dbeaver-proxy-macos.sha256

  # ── Attach binaries to GitHub Release ──
  attach-to-release:
    name: Attach binaries to Release
    if: ${{ fromJSON(needs.release-plz.outputs.releases)[0] != '' }}
    needs: [release-plz, universal-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get release tag
        id: tag
        run: |
          echo "tag=${{ fromJSON(needs.release-plz.outputs.releases)[0].tag }}" >> $GITHUB_OUTPUT

      - name: Upload assets to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            artifacts/dbeaver-proxy-x86_64-linux
            artifacts/dbeaver-proxy-x86_64-linux.sha256
            artifacts/dbeaver-proxy-x86_64-windows.exe
            artifacts/dbeaver-proxy-x86_64-windows.exe.sha256
            artifacts/dbeaver-proxy-macos
            artifacts/dbeaver-proxy-macos.sha256
